<!-- @dsCard group="Analyzer" viewport="1280x760" name="Analyzer — interactive flow" subtitle="Job → Candidate → Analysis → Report click-through" -->
<!-- @startingPoint section="Analyzer" subtitle="Full recruiter analyzer flow (4 screens)" viewport="1280x760" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Technical Maturity Analyzer</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--bg-app); }
  body { font-family: var(--font-sans); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  ::selection { background: var(--blue-100); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="JobInputScreen.jsx"></script>
<script type="text/babel" src="CandidateEvidenceScreen.jsx"></script>
<script type="text/babel" src="AnalysisProgressScreen.jsx"></script>
<script type="text/babel" src="ReportScreen.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [step, setStep] = React.useState(() => localStorage.getItem("tma_step") || "job");
  React.useEffect(() => { localStorage.setItem("tma_step", step); }, [step]);
  React.useEffect(() => { window.scrollTo(0, 0); }, [step]);

  let screen = null;
  if (step === "job") screen = <window.JobInputScreen onContinue={() => setStep("candidate")} />;
  else if (step === "candidate") screen = <window.CandidateEvidenceScreen onBack={() => setStep("job")} onStart={() => setStep("progress")} />;
  else if (step === "progress") screen = <window.AnalysisProgressScreen onComplete={() => setStep("report")} />;
  else screen = <window.ReportScreen onRestart={() => setStep("job")} />;

  return (
    <window.AppShell current={step} showStepper={true}>
      {screen}
    </window.AppShell>
  );
}

function mount() {
  if (!window.JobInputScreen || !window.ReportScreen || !window.AppShell) { setTimeout(mount, 40); return; }
  if (window.lucide && window.lucide.createIcons) { try { window.lucide.createIcons(); } catch (e) {} }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}
mount();
</script>
</body>
</html>

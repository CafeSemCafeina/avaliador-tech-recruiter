<!-- @dsCard group="Components" viewport="700x440" name="Recruiting — Matrix, STAR, Source, Signals" subtitle="QuadrantCard, StarQuestion, SourceCard, QualBadge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style> body { margin:0; background:var(--bg-app); padding:22px; } </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { QuadrantCard, StarQuestion, SourceCard, QualBadge, Textarea } = window.TechnicalMaturityAnalyzerDesignSystem_3be3ec;
const Lbl = ({children}) => <div style={{fontFamily:"var(--font-mono)",fontSize:10,letterSpacing:"0.06em",textTransform:"uppercase",color:"var(--text-muted)",margin:"2px 0 6px"}}>{children}</div>;
function Demo(){
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div>
        <Lbl>Qualitative signals</Lbl>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          <QualBadge label="Seniority Signal" value="Mid plausible" tone="validate"/>
          <QualBadge label="Stack Evidence" value="Strong in React/TS" tone="confirmed"/>
          <QualBadge label="Public Proof" value="Mixed" tone="uncertain"/>
        </div>
      </div>
      <div>
        <Lbl>Evidence matrix</Lbl>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <QuadrantCard quadrant="strong_with_evidence" title="React & TypeScript project ownership"
            source="GitHub shows a typed React/Vite app with component and API structure."
            interviewFocus="Validate ownership and production depth."/>
          <QuadrantCard quadrant="weak_with_evidence" title="Backend depth for full-stack role"
            source="Public repositories are mostly frontend-focused with limited server logic."
            interviewFocus="Ask whether backend work exists in private projects."/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,alignItems:"start"}}>
        <div>
          <Lbl>STAR question</Lbl>
          <StarQuestion index={1} question="Tell me about a feature you owned from implementation to deployment."
            followUps={["What trade-offs did you consider?","How did you validate the solution?"]}/>
        </div>
        <div>
          <Lbl>Source card</Lbl>
          <SourceCard title="Resume" description="PDF or pasted text" required filled meta="resume.pdf · 184 KB"/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>

<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="IBM Plex Sans — display to body" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); color: var(--text-primary); padding: 20px 22px; }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 6px 0; border-bottom: 1px solid var(--neutral-100); }
  .row:last-child { border-bottom: none; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 130px; flex: none; }
</style>
</head>
<body>
  <div class="row"><span class="tag">3xl · 36 / 600</span><span style="font-size:var(--text-3xl);font-weight:600;letter-spacing:-0.01em">Recruiter summary</span></div>
  <div class="row"><span class="tag">2xl · 28 / 600</span><span style="font-size:var(--text-2xl);font-weight:600">Evidence matrix</span></div>
  <div class="row"><span class="tag">xl · 22 / 600</span><span style="font-size:var(--text-xl);font-weight:600">Interview focus</span></div>
  <div class="row"><span class="tag">lg · 18 / 500</span><span style="font-size:var(--text-lg);font-weight:500">Stack evidence</span></div>
  <div class="row"><span class="tag">base · 14 / 400</span><span style="font-size:var(--text-base)">Public evidence suggests typed React ownership.</span></div>
  <div class="row"><span class="tag">sm · 13 / 400</span><span style="font-size:var(--text-sm);color:var(--text-secondary)">Evidence is indirect and should be validated in interview.</span></div>
</body>
</html>

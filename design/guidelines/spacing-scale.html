<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base — compact but breathable" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-mono); padding: 20px 22px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 3px 0; }
  .tag { width: 70px; font-size: 10px; color: var(--text-secondary); flex: none; }
  .bar { height: 12px; background: var(--blue-200); border-radius: 2px; }
</style>
</head>
<body>
  <div class="row"><span class="tag">1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tag">2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tag">3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tag">4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tag">6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tag">8 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tag">12 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tag">16 · 64</span><div class="bar" style="width:64px"></div></div>
</body>
</html>

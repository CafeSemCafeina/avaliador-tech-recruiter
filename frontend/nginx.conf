server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA: no React Router yet (single page), but fall back to index.html so any
    # path serves the app rather than 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Vite assets are immutable; cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}

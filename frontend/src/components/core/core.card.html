<div id="root"></div>

<script type="text/babel">
const { Button, Card, Avatar } = window.TechnicalMaturityAnalyzerDesignSystem_3be3ec;
const Row = ({children}) => <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>{children}</div>;
